<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zad3_1</title>
</head>
<body>
    <div id = 'root'></div>

    <script>

        //Tablica jako zmienna globalna

        const FILMS = [
            { id: 1, title: 'Oppenheimer',       year: 2023, genre: 'Dramat',  rating: 5, watched: true  },
            { id: 2, title: 'Dune: Część druga', year: 2024, genre: 'Sci-Fi',  rating: 4, watched: false },
            { id: 3, title: 'Past Lives',        year: 2023, genre: 'Romans',  rating: 5, watched: true  },
            { id: 4, title: 'Poor Things',       year: 2023, genre: 'Komedia', rating: 4, watched: false },
        ];
    </script>

    <!-- React 18 ładowany z CDN -->

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script>

        //RatingStars({ rating }) — zwraca element <span> z rating wypełnionymi gwiazdkami (★) i dopełnieniem pustymi (☆) do pięciu. Przykład: rating=4 → ★★★★☆.

        function RatingStars({rating}){
            const fullStars = '★'.repeat(rating);
            const emptyStars = '☆'.repeat(5 - rating);
            const stars = fullStars + emptyStars;
            
            return React.createElement('span', null, stars);
        }

        //FilmCard({ title, year, genre, rating, watched }) — zwraca element <div> zawierający: tytuł z rokiem w <h3>, gatunek w <span>, komponent RatingStars oraz — warunkowo — element <p> z tekstem ✓ Obejrzany gdy watched === true, w przeciwnym razie null.

        function FilmCard({title, year, genre, rating, watched}){
            return React.createElement(
                'div',
                null,
                React.createElement('h3', null, title + ' (' + year +')'),
                React.createElement('span', null, genre),
                React.createElement(RatingStars, {rating}),
                watched === true
                ? React.createElement('p', null, '✓ Obejrzany')
                :null

            );
        }

        //App() — zwraca element <div> z nagłówkiem <h1>🎬 Biblioteka Filmów</h1> i kartami wszystkich filmów renderowanymi przez FILMS.map() z key={film.id}.

        function App(){
            return React.createElement(
                'div',
                null,
                React.createElement('h1', null, '🎬 Biblioteka Filmów'),
                FILMS.map(function ({id, title, year, genre, rating, watched}){
                    return React.createElement(FilmCard, {
                        key: id,
                        title: title,
                        year: year,
                        genre: genre,
                        rating: rating,
                        watched: watched
                    })
                })
            )
        }

        //wypisz wynik React.createElement('span', null, '★★★☆☆') do konsoli i przejrzyj pola $$typeof, type, props.

        const testElement = React.createElement('span', null, '★★★☆☆');
        console.log(testElement);

        //Wypisz do konsoli wynik React.createElement(FilmCard, { title: 'Test', year: 2024, genre: 'Dramat', rating: 3, watched: false }) i sprawdź pole type

        const testFilmCard = React.createElement(FilmCard, {
            title: 'Test',
            year: 2024,
            genre: 'Dramat',
            rating: 3,
            watched: false
        });
        
        console.log(testFilmCard);

        //Punkt montowania: ReactDOM.createRoot(document.getElementById('root')).render(...).

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

    </script>

</body>
</html>
